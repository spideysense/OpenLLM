<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#E8F4F8"/>
  
  <!-- Bear body/head -->
  <ellipse cx="512" cy="540" rx="280" ry="300" fill="#B08040"/>
  
  <!-- Bear ears -->
  <circle cx="300" cy="280" r="100" fill="#B08040"/>
  <circle cx="724" cy="280" r="100" fill="#B08040"/>
  <circle cx="300" cy="280" r="60" fill="#D4A04A"/>
  <circle cx="724" cy="280" r="60" fill="#D4A04A"/>
  
  <!-- Bear face -->
  <ellipse cx="512" cy="560" rx="240" ry="260" fill="#D4A04A"/>
  
  <!-- Eyes -->
  <ellipse cx="400" cy="440" rx="36" ry="42" fill="#2D3436"/>
  <ellipse cx="624" cy="440" rx="36" ry="42" fill="#2D3436"/>
  <!-- Eye shine -->
  <circle cx="414" cy="426" r="12" fill="#FFF"/>
  <circle cx="638" cy="426" r="12" fill="#FFF"/>
  
  <!-- Nose -->
  <ellipse cx="512" cy="540" rx="48" ry="36" fill="#5D4E37"/>
  <!-- Nose shine -->
  <ellipse cx="520" cy="530" rx="16" ry="10" fill="#8B6914" opacity="0.5"/>
  
  <!-- Mouth -->
  <path d="M 480 570 Q 512 610 544 570" fill="none" stroke="#5D4E37" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <circle cx="350" cy="530" r="40" fill="#E8A060" opacity="0.4"/>
  <circle cx="674" cy="530" r="40" fill="#E8A060" opacity="0.4"/>
  
  <!-- Pipe -->
  <g transform="translate(580, 590) rotate(-20)">
    <!-- Pipe bowl -->
    <rect x="0" y="-10" width="40" height="50" rx="8" fill="#5D4E37"/>
    <ellipse cx="20" cy="-10" rx="24" ry="10" fill="#5D4E37"/>
    <!-- Pipe stem -->
    <rect x="-80" y="12" width="85" height="12" rx="6" fill="#8B6914"/>
    <!-- Smoke wisps -->
    <path d="M 15 -25 Q 25 -50 15 -70" fill="none" stroke="#B0BEC5" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <path d="M 30 -22 Q 40 -55 28 -80" fill="none" stroke="#B0BEC5" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  </g>
  
  <!-- Code brackets (AI/LLM indicator) -->
  <text x="512" y="770" text-anchor="middle" font-family="monospace" font-size="80" font-weight="bold" fill="#5D4E37" opacity="0.7">&lt;/&gt;</text>
</svg>
