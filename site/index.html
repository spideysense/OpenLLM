<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet — The Free LLM</title>
<meta name="description" content="Monet is a free AI that runs entirely on your computer. Your conversations never leave your machine. Download for Mac or Windows.">
<meta property="og:title" content="Monet — The Free LLM">
<meta property="og:description" content="Free AI. Runs locally. Your data stays yours.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --lavender: #9B7EC8;
  --lavender-light: #C8B0E8;
  --rose: #C05888;
  --rose-light: #E090B8;
  --cerulean: #3A72B8;
  --cerulean-light: #7AAAD8;
  --sage: #5A8C6A;
  --sage-light: #90C8A0;
  --gold: #C8880A;
  --gold-light: #E8B840;
  --earth: #3D2E20;
  --earth-mid: #6B5040;
  --earth-light: #9B7858;
  --parchment: #FDF9F3;
  --cream: #F8F2E8;
  --mist: rgba(253,249,243,0.7);
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Lato', system-ui, sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--parchment);
  font-family: var(--sans);
  color: var(--earth);
  user-select: none;
}

/* ─── Impressionist background ─── */
.scene {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: radial-gradient(ellipse at 30% 40%, rgba(200,176,232,0.45) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 60%, rgba(144,200,160,0.35) 0%, transparent 55%),
              radial-gradient(ellipse at 50% 20%, rgba(122,170,216,0.30) 0%, transparent 50%),
              radial-gradient(ellipse at 20% 80%, rgba(232,184,64,0.20) 0%, transparent 45%),
              radial-gradient(ellipse at 80% 20%, rgba(224,144,184,0.25) 0%, transparent 50%),
              #F5EFE4;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0;
  animation: blob-drift linear infinite;
}
.b1{width:500px;height:500px;background:rgba(155,126,200,0.3);left:-100px;top:-50px;animation-duration:55s;animation-delay:0s}
.b2{width:400px;height:400px;background:rgba(90,140,106,0.25);right:-80px;top:100px;animation-duration:65s;animation-delay:-20s}
.b3{width:350px;height:350px;background:rgba(58,114,184,0.2);left:30%;bottom:-80px;animation-duration:48s;animation-delay:-10s}
.b4{width:300px;height:300px;background:rgba(192,88,136,0.2);right:10%;bottom:50px;animation-duration:72s;animation-delay:-35s}
.b5{width:280px;height:280px;background:rgba(200,136,10,0.15);left:60%;top:10%;animation-duration:60s;animation-delay:-15s}
.b6{width:450px;height:450px;background:rgba(155,126,200,0.15);right:20%;top:-100px;animation-duration:80s;animation-delay:-40s}

@keyframes blob-drift {
  0%   { opacity: 0.6; transform: translate(0,0) scale(1); }
  25%  { opacity: 0.8; transform: translate(30px, 20px) scale(1.05); }
  50%  { opacity: 0.6; transform: translate(20px, -15px) scale(0.95); }
  75%  { opacity: 0.75; transform: translate(-15px, 25px) scale(1.03); }
  100% { opacity: 0.6; transform: translate(0,0) scale(1); }
}

/* Paint dabs floating in air */
.dab {
  position: absolute;
  border-radius: 50%;
  animation: dab-float ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes dab-float {
  from { transform: translateY(0) rotate(0deg); opacity: 0.6; }
  to   { transform: translateY(-18px) rotate(8deg); opacity: 0.9; }
}

/* ─── Stage / Center ─── */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* ─── Monet Figure ─── */
.figure-wrap {
  position: relative;
  width: 220px;
  height: 380px;
  flex-shrink: 0;
  transform: translateY(20px);
  opacity: 0;
  animation: figure-enter 1.2s cubic-bezier(.22,1,.36,1) 0.3s forwards;
}

@keyframes figure-enter {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}

.monet-figure {
  width: 100%; height: 100%;
  overflow: visible;
}

/* Idle breathing */
.figure-body {
  transform-origin: 50% 90%;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { transform: scaleY(1) translateY(0); }
  50%     { transform: scaleY(1.012) translateY(-2px); }
}

/* Head slight sway */
.figure-head {
  transform-origin: 50% 100%;
  animation: head-sway 5s ease-in-out infinite;
}
@keyframes head-sway {
  0%,100% { transform: rotate(0deg); }
  30%     { transform: rotate(1.2deg); }
  70%     { transform: rotate(-0.8deg); }
}

/* Talking animation */
.figure-head.talking {
  animation: head-talk 0.35s ease-in-out infinite alternate;
}
@keyframes head-talk {
  from { transform: rotate(-1deg) translateY(0); }
  to   { transform: rotate(1deg) translateY(-1px); }
}

/* Palette arm */
.arm-palette {
  transform-origin: 75px 140px;
  animation: arm-idle 6s ease-in-out infinite;
}
@keyframes arm-idle {
  0%,100% { transform: rotate(0deg); }
  50%     { transform: rotate(2deg) translate(1px,-1px); }
}
.arm-palette.gesturing {
  animation: arm-gesture 1.2s ease-in-out infinite alternate;
}
@keyframes arm-gesture {
  from { transform: rotate(-5deg) translate(-3px, 0); }
  to   { transform: rotate(5deg) translate(3px, -6px); }
}

/* Brush arm */
.arm-brush {
  transform-origin: 125px 140px;
  animation: brush-idle 7s ease-in-out infinite;
}
@keyframes brush-idle {
  0%,100%{ transform: rotate(0deg); }
  40%    { transform: rotate(-2deg); }
  80%    { transform: rotate(1.5deg); }
}
.arm-brush.painting {
  animation: brush-paint 0.8s ease-in-out infinite alternate;
}
@keyframes brush-paint {
  from { transform: rotate(-8deg) translate(-2px, 2px); }
  to   { transform: rotate(8deg) translate(4px, -4px); }
}

/* Shadow under figure */
.figure-shadow {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100px; height: 16px;
  background: radial-gradient(ellipse, rgba(61,46,32,0.2), transparent 70%);
  border-radius: 50%;
  animation: shadow-breathe 4s ease-in-out infinite;
}
@keyframes shadow-breathe {
  0%,100% { transform: translateX(-50%) scaleX(1); opacity: 0.7; }
  50%     { transform: translateX(-50%) scaleX(0.95); opacity: 0.5; }
}

/* ─── Subtitle strip ─── */
.subtitle {
  max-width: 560px;
  min-height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 28px;
  margin-top: 4px;
  opacity: 0;
  transition: opacity 0.5s;
}
.subtitle.visible { opacity: 1; }
.subtitle-inner {
  font-family: var(--serif);
  font-size: clamp(16px, 2.2vw, 20px);
  font-style: italic;
  color: var(--earth);
  text-align: center;
  line-height: 1.55;
  background: var(--mist);
  padding: 12px 24px;
  border-radius: 12px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(155,120,88,0.12);
  box-shadow: 0 4px 24px rgba(61,46,32,0.07);
  min-height: 56px;
  display: flex;
  align-items: center;
}
.cursor {
  display: inline-block;
  width: 2px; height: 1.1em;
  background: var(--lavender);
  margin-left: 3px;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ─── Nav buttons ─── */
.nav-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s, transform 0.6s;
  pointer-events: none;
}
.nav-buttons.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}
.nav-btn {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--earth);
  background: rgba(253,249,243,0.85);
  border: 1.5px solid rgba(155,120,88,0.22);
  border-radius: 50px;
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 12px rgba(61,46,32,0.07);
  white-space: nowrap;
}
.nav-btn:hover {
  background: rgba(155,126,200,0.15);
  border-color: var(--lavender);
  color: #5B3A8E;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(155,126,200,0.2);
}
.nav-btn.active {
  background: rgba(155,126,200,0.2);
  border-color: var(--lavender);
  color: #5B3A8E;
}
.nav-btn.download-btn {
  background: var(--gold);
  border-color: var(--gold);
  color: white;
  font-style: italic;
}
.nav-btn.download-btn:hover {
  background: var(--gold-light);
  border-color: var(--gold-light);
  color: var(--earth);
  transform: translateY(-2px);
}

/* ─── Chat panel ─── */
.chat-panel {
  margin-top: 16px;
  width: clamp(280px, 50vw, 480px);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s, transform 0.4s;
  pointer-events: none;
}
.chat-panel.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}
.chat-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  background: rgba(253,249,243,0.9);
  border: 1.5px solid rgba(155,120,88,0.2);
  border-radius: 50px;
  padding: 8px 8px 8px 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 24px rgba(61,46,32,0.08);
}
.chat-input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  color: var(--earth);
  outline: none;
}
.chat-input::placeholder { color: var(--earth-light); }
.chat-send {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--lavender);
  color: white;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.chat-send:hover { background: #7B5EA8; transform: scale(1.05); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.mic-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid rgba(155,120,88,0.2);
  background: transparent;
  color: var(--earth-light);
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.mic-btn:hover { background: rgba(155,126,200,0.1); color: var(--lavender); }
.mic-btn.listening {
  background: rgba(192,88,136,0.15);
  border-color: var(--rose);
  color: var(--rose);
  animation: pulse-mic 1s ease-in-out infinite;
}
@keyframes pulse-mic {
  0%,100%{ box-shadow: 0 0 0 0 rgba(192,88,136,0.3); }
  50%    { box-shadow: 0 0 0 8px rgba(192,88,136,0); }
}

/* ─── Branding corner ─── */
.brand {
  position: fixed;
  top: 24px; left: 28px;
  display: flex; align-items: center; gap: 10px;
  opacity: 0;
  animation: fade-in 1s ease 1.2s forwards;
}
@keyframes fade-in { to { opacity: 1; } }
.brand-logo { width: 32px; height: 32px; }
.brand-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--earth);
  letter-spacing: 0.02em;
}
.brand-tagline {
  font-size: 11px;
  font-family: var(--sans);
  color: var(--earth-light);
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: block;
  margin-top: -2px;
}

/* ─── Volume toggle ─── */
.volume-btn {
  position: fixed;
  top: 24px; right: 24px;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid rgba(155,120,88,0.2);
  background: rgba(253,249,243,0.8);
  color: var(--earth-light);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  transition: all 0.2s;
  opacity: 0;
  animation: fade-in 1s ease 1.5s forwards;
}
.volume-btn:hover { background: rgba(253,249,243,0.95); color: var(--earth); }

/* ─── Download modal ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(61,46,32,0.3);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  z-index: 100;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--parchment);
  border-radius: 24px;
  padding: 48px 40px 40px;
  max-width: 440px; width: 90%;
  box-shadow: 0 32px 80px rgba(61,46,32,0.2);
  border: 1px solid rgba(155,120,88,0.12);
  transform: translateY(20px) scale(0.96);
  transition: transform 0.3s;
  text-align: center;
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-logo { font-size: 48px; margin-bottom: 8px; }
.modal h2 {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  color: var(--earth);
  margin-bottom: 8px;
}
.modal p {
  font-size: 15px;
  color: var(--earth-light);
  margin-bottom: 28px;
  line-height: 1.6;
  font-weight: 300;
}
.modal-btns { display: flex; gap: 12px; justify-content: center; }
.dl-btn {
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  padding: 12px 28px;
  border-radius: 50px;
  border: 1.5px solid rgba(155,120,88,0.2);
  background: var(--cream);
  color: var(--earth);
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
  text-decoration: none;
}
.dl-btn:hover { background: rgba(155,126,200,0.12); border-color: var(--lavender); }
.dl-btn.primary { background: var(--lavender); color: white; border-color: var(--lavender); }
.dl-btn.primary:hover { background: #7B5EA8; }
.modal-close {
  position: absolute; top: 16px; right: 20px;
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--earth-light);
}

/* ─── Responsive ─── */
@media (max-width: 600px) {
  .figure-wrap { width: 160px; height: 280px; }
  .nav-buttons { gap: 8px; }
  .nav-btn { padding: 8px 16px; font-size: 13px; }
  .subtitle-inner { font-size: 15px; padding: 10px 18px; }
}
@media (max-height: 700px) {
  .figure-wrap { height: 260px; }
  .subtitle { min-height: 60px; margin-top: 0; }
}
</style>
</head>
<body>

<!-- Impressionist background -->
<div class="scene">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>
  <div class="blob b6"></div>
  <!-- Floating paint dabs -->
  <div class="dab" style="width:12px;height:9px;background:#9B7EC8;opacity:.5;top:15%;left:12%;animation-duration:4.5s;animation-delay:0s"></div>
  <div class="dab" style="width:8px;height:8px;background:#C05888;opacity:.45;top:22%;right:18%;animation-duration:5.5s;animation-delay:1s"></div>
  <div class="dab" style="width:10px;height:7px;background:#3A72B8;opacity:.4;bottom:28%;left:22%;animation-duration:6s;animation-delay:2s"></div>
  <div class="dab" style="width:7px;height:7px;background:#5A8C6A;opacity:.5;bottom:35%;right:15%;animation-duration:5s;animation-delay:0.5s"></div>
  <div class="dab" style="width:14px;height:10px;background:#C8880A;opacity:.4;top:40%;left:8%;animation-duration:7s;animation-delay:1.5s"></div>
  <div class="dab" style="width:9px;height:9px;background:#9B7EC8;opacity:.4;top:60%;right:10%;animation-duration:4s;animation-delay:3s"></div>
  <div class="dab" style="width:11px;height:8px;background:#C05888;opacity:.35;top:8%;right:35%;animation-duration:6.5s;animation-delay:2.5s"></div>
</div>

<!-- Branding -->
<div class="brand">
  <svg class="brand-logo" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="19" fill="#FDF6EC" stroke="#E8D9C0" stroke-width="1"/>
    <rect x="5" y="9" width="5" height="18" rx="2" fill="#5B3A8E" opacity=".90"/>
    <path d="M8 10 L17 20 L17 22 L5 12 Z" fill="#7B3FA0" opacity=".85"/>
    <path d="M21 20 L30 10 L32 11 L22 22 Z" fill="#3A72B8" opacity=".85"/>
    <rect x="30" y="9" width="5" height="18" rx="2" fill="#2A5EA0" opacity=".90"/>
    <ellipse cx="19" cy="20" rx="3" ry="4" fill="#9B3A6A" opacity=".85"/>
    <circle cx="7" cy="10" r="2" fill="#A070D0" opacity=".75"/>
    <circle cx="33" cy="10" r="2" fill="#5090D0" opacity=".75"/>
    <circle cx="20" cy="7" r="2" fill="#E060A0" opacity=".70"/>
  </svg>
  <div>
    <span class="brand-name">Monet</span>
    <span class="brand-tagline">The Free LLM</span>
  </div>
</div>

<!-- Volume toggle -->
<button class="volume-btn" id="volume-btn" title="Toggle voice" onclick="toggleVoice()">🔊</button>

<!-- Stage -->
<div class="stage">
  <!-- Character -->
  <div class="figure-wrap">
    <div class="figure-shadow"></div>
    <svg class="monet-figure" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="soft-skin" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="0.8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="soft-beard" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="1.2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="body-grad" cx="50%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#4A3828" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#2A1E18" stop-opacity="1"/>
        </radialGradient>
        <radialGradient id="coat-grad" cx="40%" cy="20%" r="70%">
          <stop offset="0%" stop-color="#3D2E24"/>
          <stop offset="100%" stop-color="#1E1410"/>
        </radialGradient>
      </defs>

      <!-- Body group — breathing animation -->
      <g class="figure-body">

        <!-- Feet -->
        <ellipse cx="84" cy="388" rx="16" ry="7" fill="#1A1210"/>
        <ellipse cx="116" cy="388" rx="14" ry="7" fill="#1A1210"/>
        <!-- Trouser legs visible below coat -->
        <rect x="74" y="295" width="22" height="98" rx="5" fill="#2A2238"/>
        <rect x="104" y="295" width="22" height="98" rx="5" fill="#252035"/>

        <!-- Long coat — lower flare -->
        <path d="M48 195 Q45 295 50 390 L90 390 L100 270 L110 390 L152 390 Q156 295 152 195 Z" fill="url(#coat-grad)"/>
        <!-- Coat hem highlight line -->
        <path d="M50 390 Q100 396 150 390" stroke="#3D2E24" stroke-width="1.5" fill="none" opacity=".5"/>

        <!-- Coat body -->
        <path d="M44 118 Q48 210 52 285 L148 285 Q152 210 156 118 Q128 130 100 128 Q72 130 44 118 Z" fill="url(#coat-grad)"/>

        <!-- Coat lapels -->
        <path d="M88 118 L80 175 L100 190 L120 175 L112 118 Q100 128 88 118 Z" fill="#3D3028" opacity=".9"/>

        <!-- Waistcoat vest -->
        <path d="M84 122 L88 230 L100 235 L112 230 L116 122 Q100 134 84 122 Z" fill="#5A4030"/>

        <!-- Shirt bib -->
        <path d="M90 122 L93 175 L100 178 L107 175 L110 122 Q100 130 90 122 Z" fill="#F5F0E8"/>

        <!-- Cravat/bow-tie area -->
        <ellipse cx="100" cy="118" rx="8" ry="5" fill="#8B3030" opacity=".8"/>

        <!-- Palette arm — LEFT (extended forward holding palette) -->
        <g class="arm-palette">
          <!-- Upper arm -->
          <path d="M54 130 Q32 150 28 190 Q26 218 34 235" stroke="#2A1E18" stroke-width="22" fill="none" stroke-linecap="round"/>
          <path d="M54 130 Q32 150 28 190 Q26 218 34 235" stroke="#3D2E24" stroke-width="18" fill="none" stroke-linecap="round"/>
          <!-- Sleeve cuff -->
          <ellipse cx="35" cy="237" rx="10" ry="6" fill="#C0B090" transform="rotate(-10 35 237)"/>
          <!-- Hand -->
          <ellipse cx="34" cy="248" rx="9" ry="7" fill="#C8986A" filter="url(#soft-skin)" transform="rotate(-15 34 248)"/>
          <!-- Thumb -->
          <ellipse cx="26" cy="250" rx="5" ry="3.5" fill="#C8986A" transform="rotate(-30 26 250)"/>
          <!-- Palette -->
          <g transform="translate(0, 255) rotate(-20)">
            <path d="M10 0 Q15 -22 36 -18 Q55 -14 52 6 Q50 22 30 22 Q12 20 10 0 Z" fill="#B87830" opacity=".95"/>
            <path d="M10 0 Q15 -22 36 -18 Q55 -14 52 6 Q50 22 30 22 Q12 20 10 0 Z" fill="none" stroke="#8B6020" stroke-width="1" opacity=".6"/>
            <!-- Paint colors on palette -->

        <!-- Brush arm — RIGHT (slightly raised, painting gesture) -->

          <ellipse cx="159" cy="234" rx="10" ry="6" fill="#C0B090" transform="rotate(10 159 234)"/>
          <!-- Hand -->
          <ellipse cx="160" cy="245" rx="9" ry="7" fill="#C8986A" filter="url(#soft-skin)" transform="rotate(15 160 245)"/>
          <!-- Fingers suggestion -->
          <ellipse cx="168" cy="247" rx="5" ry="3" fill="#C8986A" transform="rotate(20 168 247)"/>
          <!-- Paintbrush -->
          <g transform="translate(152, 255) rotate(20)">
            <!-- Handle -->
            <rect x="-3" y="-32" width="6" height="52" rx="3" fill="#8B6030"/>
            <rect x="-2" y="-32" width="3" height="52" rx="2" fill="#A87840" opacity=".5"/>

            <rect x="-4" y="18" width="8" height="9" rx="1.5" fill="#B0B8C0"/>
            <rect x="-4" y="20" width="8" height="2" fill="#D0D8E0" opacity=".7"/>
            <!-- Bristles -->
            <path d="M-4 27 Q0 48 -1 56 Q1 60 2 56 Q5 48 4 27 Z" fill="#3A2818"/>
            <path d="M-2 29 Q1 46 0 54" stroke="#6A4828" stroke-width="0.8" fill="none" opacity=".5"/>
            <path d="M1 29 Q2 46 2 54" stroke="#5A3818" stroke-width="0.8" fill="none" opacity=".4"/>
            <!-- Fresh paint on brush tip -->
            <ellipse cx="1" cy="56" rx="4" ry="2.5" fill="#9B5EC8" opacity=".9"/>
            <ellipse cx="1" cy="56" rx="2" ry="1.5" fill="#C08AE8" opacity=".7"/>
          </g>
        </g>

        <!-- Shoulders (coat shoulder seams) -->
        <path d="M44 118 Q60 112 100 110 Q140 112 156 118" stroke="#4A3828" stroke-width="3" fill="none" opacity=".5"/>

        <!-- Neck -->
        <rect x="91" y="94" width="18" height="28" rx="6" fill="#B88058"/>

        <!-- HEAD GROUP -->
        <g class="figure-head">
          <!-- Head -->
          <ellipse cx="100" cy="70" rx="31" ry="37" fill="#C8906A" filter="url(#soft-skin)"/>
          <!-- Slight forehead highlight -->
          <ellipse cx="97" cy="54" rx="16" ry="10" fill="#D8A878" opacity=".6"/>
          <!-- Cheek warmth -->
          <ellipse cx="80" cy="74" rx="10" ry="8" fill="#D89068" opacity=".35"/>
          <ellipse cx="120" cy="74" rx="10" ry="8" fill="#D89068" opacity=".35"/>

          <!-- Beret -->
          <ellipse cx="100" cy="45" rx="36" ry="13" fill="#28244A"/>
          <path d="M68 42 Q75 18 100 14 Q125 18 132 42" fill="#28244A"/>
          <ellipse cx="100" cy="14" rx="5" ry="4" fill="#28244A"/>
          <!-- Beret highlight -->
          <path d="M78 30 Q86 22 100 20" stroke="#3D3870" stroke-width="2" fill="none" opacity=".5"/>

          <!-- White hair at temples -->
          <path d="M70 55 Q64 65 66 82" stroke="#E8E4DC" stroke-width="5" fill="none" stroke-linecap="round" opacity=".75"/>
          <path d="M130 55 Q136 65 134 82" stroke="#E8E4DC" stroke-width="5" fill="none" stroke-linecap="round" opacity=".75"/>

          <!-- BEARD (Monet's iconic flowing white beard) -->
          <g filter="url(#soft-beard)">
            <!-- Main beard shape -->
            <path d="M72 82 Q68 98 70 122 Q76 150 100 158 Q124 150 130 122 Q132 98 128 82 Q118 76 100 74 Q82 76 72 82 Z" fill="#EEE8DC" opacity=".95"/>
            <!-- Beard shadow/depth -->
            <path d="M72 82 Q70 100 72 122 Q78 148 100 156" stroke="#C8C0B0" stroke-width="2" fill="none" opacity=".4"/>
            <path d="M100 76 Q100 112 100 156" stroke="#C8C0B0" stroke-width="1.5" fill="none" opacity=".3"/>
            <path d="M128 82 Q130 100 128 122 Q122 148 100 156" stroke="#C8C0B0" stroke-width="2" fill="none" opacity=".4"/>
            <!-- Beard edge softness -->
            <path d="M73 84 Q68 100 70 124" stroke="#D8D0C0" stroke-width="3" fill="none" opacity=".3"/>
            <path d="M127 84 Q132 100 130 124" stroke="#D8D0C0" stroke-width="3" fill="none" opacity=".3"/>
          </g>

          <!-- Mustache -->
          <path d="M82 80 Q91 84 100 82 Q109 84 118 80 Q112 90 100 88 Q88 90 82 80 Z" fill="#E8E2D4" opacity=".9"/>

          <!-- Eyes -->
          <ellipse cx="87" cy="64" rx="4.5" ry="5.5" fill="#2A2018"/>
          <ellipse cx="113" cy="64" rx="4.5" ry="5.5" fill="#2A2018"/>
          <!-- Eye whites -->
          <ellipse cx="87" cy="63" rx="3.5" ry="4.5" fill="#2A2018"/>
          <!-- Eye shine -->
          <circle cx="89" cy="62" r="1.8" fill="white" opacity=".85"/>
          <circle cx="115" cy="62" r="1.8" fill="white" opacity=".85"/>
          <!-- Eyebrows (bushy) -->
          <path d="M78 56 Q87 52 97 54" stroke="#5A4830" stroke-width="3" fill="none" stroke-linecap="round" opacity=".8"/>
          <path d="M103 54 Q113 52 122 56" stroke="#5A4830" stroke-width="3" fill="none" stroke-linecap="round" opacity=".8"/>

          <!-- Round wire glasses -->
          <circle cx="87" cy="64" r="10" fill="none" stroke="#8B7040" stroke-width="1.5" opacity=".65"/>
          <circle cx="113" cy="64" r="10" fill="none" stroke="#8B7040" stroke-width="1.5" opacity=".65"/>
          <line x1="97" y1="64" x2="103" y2="64" stroke="#8B7040" stroke-width="1.5" opacity=".65"/>
          <line x1="65" y1="60" x2="77" y2="63" stroke="#8B7040" stroke-width="1.5" opacity=".65"/>
          <line x1="123" y1="63" x2="135" y2="60" stroke="#8B7040" stroke-width="1.5" opacity=".65"/>

          <!-- Nose -->
          <ellipse cx="100" cy="75" rx="5" ry="6" fill="#B87850" opacity=".6"/>
          <path d="M95 79 Q100 82 105 79" stroke="#A06840" stroke-width="1" fill="none" opacity=".5"/>

          <!-- Lips (small, mostly hidden by mustache) -->
          <path d="M95 88 Q100 91 105 88" stroke="#A06848" stroke-width="1.5" fill="none" opacity=".5"/>
        </g>
        <!-- End head group -->

      </g>
      <!-- End body group -->
    </svg>
  </div>

  <!-- Subtitle -->
  <div class="subtitle" id="subtitle">
    <div class="subtitle-inner">
      <span id="subtitle-text"></span>
      <span class="cursor" id="cursor"></span>
    </div>
  </div>

  <!-- Navigation buttons -->
  <div class="nav-buttons" id="nav-buttons">
    <button class="nav-btn" onclick="respond('how')" id="btn-how">How does it work?</button>
    <button class="nav-btn" onclick="respond('private')" id="btn-private">Is my data private?</button>
    <button class="nav-btn" onclick="respond('free')" id="btn-free">Is it really free?</button>
    <button class="nav-btn download-btn" onclick="openDownload()" id="btn-download">Download Monet ↓</button>
    <button class="nav-btn" onclick="respond('chat')" id="btn-chat">Ask me anything</button>
  </div>

  <!-- Chat panel -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-input-row">
      <input
        class="chat-input"
        id="chat-input"
        type="text"
        placeholder="Ask Monet anything..."
        maxlength="300"
        onkeydown="if(event.key==='Enter')sendChat()"
        autocomplete="off"
      >
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">🎙</button>
      <button class="chat-send" id="chat-send" onclick="sendChat()">→</button>
    </div>
  </div>
</div>

<!-- Download modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-logo">🎨</div>
    <h2>Download Monet</h2>
    <p>Free, private AI — running entirely on your machine.<br>No subscriptions. No data sharing. Just art.</p>
    <div class="modal-btns">
      <a class="dl-btn primary" id="dl-mac" href="#" onclick="downloadMac(event)">
        <span>⌘</span> Mac (.dmg)
      </a>
      <a class="dl-btn" id="dl-win" href="#" onclick="downloadWin(event)">
        <span>⊞</span> Windows (.exe)
      </a>
    </div>
    <p style="margin-top:20px;margin-bottom:0;font-size:13px;color:#B09878">
      v0.1.20 · MIT License ·
      <a href="https://github.com/spideysense/OpenLLM" target="_blank" style="color:var(--lavender);text-decoration:none">View source</a>
    </p>
  </div>
</div>

<script>
// ── Config ──
const REPO = 'https://github.com/spideysense/OpenLLM';
const MAC_URL = REPO + '/releases/latest/download/Monet-mac.dmg';
const WIN_URL = REPO + '/releases/latest/download/Monet-win.exe';

// ── State ──
let voiceEnabled = true;
let isListening = false;
let isSpeaking = false;
let chatHistory = [];
let recognition = null;
let currentUtterance = null;

// ── Elements ──
const subtitle = document.getElementById('subtitle');
const subtitleText = document.getElementById('subtitle-text');
const cursor = document.getElementById('cursor');
const navButtons = document.getElementById('nav-buttons');
const chatPanel = document.getElementById('chat-panel');
const chatInput = document.getElementById('chat-input');
const chatSend = document.getElementById('chat-send');
const micBtn = document.getElementById('mic-btn');
const volumeBtn = document.getElementById('volume-btn');

// Figure elements for animation
const figHead = document.querySelector('.figure-head');
const armPalette = document.querySelector('.arm-palette');
const armBrush = document.querySelector('.arm-brush');

// ── Speech Synthesis ──
function speak(text, onEnd) {
  if (!voiceEnabled || !window.speechSynthesis) {
    if (onEnd) onEnd();
    return;
  }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.88;
  utt.pitch = 0.95;
  utt.volume = 0.9;

  // Try to find a warm, slightly accented voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.name.includes('Daniel') || v.name.includes('Karen') || v.name.includes('Moira') ||
    v.name.includes('Thomas') || v.name.includes('French') || v.lang === 'en-GB'
  ) || voices.find(v => v.lang.startsWith('en')) || voices[0];
  if (preferred) utt.voice = preferred;

  utt.onstart = () => { isSpeaking = true; setTalking(true); };
  utt.onend = () => { isSpeaking = false; setTalking(false); if (onEnd) onEnd(); };
  utt.onerror = () => { isSpeaking = false; setTalking(false); if (onEnd) onEnd(); };
  currentUtterance = utt;
  window.speechSynthesis.speak(utt);
}

function setTalking(talking) {
  if (talking) {
    figHead.classList.add('talking');
    armPalette.classList.add('gesturing');
    armBrush.classList.add('painting');
  } else {
    figHead.classList.remove('talking');
    armPalette.classList.remove('gesturing');
    armBrush.classList.remove('painting');
  }
}

// ── Typewriter ──
let typeTimer = null;
function typeText(text, speed = 28, onDone) {
  clearTimeout(typeTimer);
  subtitleText.textContent = '';
  cursor.style.display = 'inline-block';
  subtitle.classList.add('visible');
  let i = 0;
  function tick() {
    if (i <= text.length) {
      subtitleText.textContent = text.slice(0, i);
      i++;
      typeTimer = setTimeout(tick, speed);
    } else {
      cursor.style.display = 'none';
      if (onDone) onDone();
    }
  }
  tick();
}

function showText(text, callback) {
  typeText(text, 24, callback);
  speak(text, callback);
}

// ── Scripted responses ──
const LINES = {
  greeting: "Bonjour! I am Monet. Not the painter — well, a little the painter. I am an AI that runs entirely on your machine. Free. Private. Yours. May I show you how it works?",
  how: "Like sunlight on water — everything happens on your computer. Download the app, choose a model, and you are talking to AI. No server, no subscription. Your words never leave your machine.",
  private: "Magnifique question. Your data is like a private sketchbook — seen only by you. No telemetry. No cloud. Not even I know what you ask. Everything stays on your hardware, always.",
  free: "Completely free. No credit card, no trial, no expiration. You run Llama, Qwen, DeepSeek — the finest open-source models — on your own hardware. Keep your twenty dollars a month, mon ami.",
  chat: "Ah, you wish to converse! Ask me anything — about the app, how to set it up, how to use me in your code. Or simply say bonjour.",
};

// ── Greeting sequence ──
let greeted = false;
function startGreeting() {
  if (greeted) return;
  greeted = true;
  subtitle.classList.add('visible');
  setTimeout(() => {
    showText(LINES.greeting, () => {
      setTimeout(showNavButtons, 600);
    });
  }, 800);
}

function showNavButtons() {
  navButtons.classList.add('visible');
}

// ── Button responses ──
function respond(key) {
  // Mark active
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + key);
  if (btn) btn.classList.add('active');

  if (key === 'chat') {
    showText(LINES.chat, () => {
      chatPanel.classList.add('visible');
      setTimeout(() => chatInput.focus(), 100);
    });
    return;
  }

  const line = LINES[key] || "I do not know that one, mon ami. Perhaps ask me something else?";
  showText(line);
}

// ── AI Chat ──
async function sendChat() {
  const msg = chatInput.value.trim();
  if (!msg || isSpeaking) return;
  chatInput.value = '';
  chatSend.disabled = true;

  // Show thinking
  typeText('...', 100);
  subtitleText.textContent = '...';
  subtitle.classList.add('visible');
  cursor.style.display = 'inline-block';

  chatHistory.push({ role: 'user', content: msg });

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userMessage: msg, messages: chatHistory.slice(-8) }),
    });
    const data = await res.json();
    const reply = data.reply || "Pardonnez-moi, I seem to have lost my words. Try again?";
    chatHistory.push({ role: 'assistant', content: reply });
    showText(reply);
  } catch {
    showText("The connection faltered, like mist on the Seine. Please try again.");
  } finally {
    chatSend.disabled = false;
  }
}

// ── Voice input ──
function toggleMic() {
  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    showText("Voice input is not supported in this browser. Please type your question.");
    return;
  }
  if (isListening) {
    recognition?.stop();
    micBtn.classList.remove('listening');
    isListening = false;
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    chatInput.value = transcript;
    chatPanel.classList.add('visible');
  };
  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    if (chatInput.value.trim()) sendChat();
  };
  recognition.onerror = () => {
    isListening = false;
    micBtn.classList.remove('listening');
  };
  recognition.start();
  isListening = true;
  micBtn.classList.add('listening');
  chatPanel.classList.add('visible');
  chatInput.focus();
  chatInput.placeholder = 'Listening...';
  setTimeout(() => { chatInput.placeholder = 'Ask Monet anything...'; }, 8000);
}

// ── Volume toggle ──
function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  volumeBtn.textContent = voiceEnabled ? '🔊' : '🔇';
  if (!voiceEnabled) {
    window.speechSynthesis?.cancel();
    setTalking(false);
  }
}

// ── Download ──
function openDownload() {
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function downloadMac(e) {
  e.preventDefault();
  window.location.href = MAC_URL;
  setTimeout(closeModal, 800);
}
function downloadWin(e) {
  e.preventDefault();
  window.location.href = WIN_URL;
  setTimeout(closeModal, 800);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Init ──
window.speechSynthesis?.addEventListener('voiceschanged', () => {});
// Delayed start so voices load
setTimeout(startGreeting, 400);
</script>
</body>
</html>
