name: Aspen
options:
  bundleIdPrefix: com.runonaspen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  # examples package defines the mlx-swift version constraint; freeze it.
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    exactVersion: "2.29.1"
  # let mlx-swift resolve to whatever satisfies examples (0.29.x), no conflict.
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.29.1"

targets:
  Aspen:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Aspen
    entitlements:
      path: Aspen/Aspen.entitlements
      properties:
        # On-device LLMs spike memory on load. This raises the per-app memory
        # ceiling so iOS doesn't jetsam-kill Aspen mid-load on 6-8GB devices.
        com.apple.developer.kernel.increased-memory-limit: true
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runonaspen.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Aspen
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        TARGETED_DEVICE_FAMILY: "1,2"
