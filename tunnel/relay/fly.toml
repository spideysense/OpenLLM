app = "llmbear-tunnel"
primary_region = "sjc"

[build]
  builder = "heroku/builder:22"

[env]
  RELAY_DOMAIN = "api.llmbear.com"

[http_service]
  internal_port = 4002
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2500
    soft_limit = 2000

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
