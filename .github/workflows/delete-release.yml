name: Delete Release
on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release ID to delete'
        required: true
permissions:
  contents: write
jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete release
        run: |
          curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/spideysense/OpenLLM/releases/${{ github.event.inputs.release_id }}"
          echo "✅ Release ${{ github.event.inputs.release_id }} deleted"
