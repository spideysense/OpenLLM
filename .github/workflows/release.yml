name: Build & Release

# NOTE: Auto-trigger on tag push is disabled. Mac releases are cut manually via
# `npm run release:mac` (which signs + notarizes + staples using the local
# Developer ID cert). CI can't sign Mac builds because the signing certificate
# isn't installed on GitHub runners, so the mac job always failed and spammed
# failure emails. This workflow is now manual-only (Run workflow button) and can
# be re-enabled once the signing cert + secrets are set up in CI.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install && npm install @electron/notarize

      - name: Build renderer
        run: npm run build:renderer

      - name: Build DMG (Universal)
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify DMG is stapled (HARD GATE — fails build if not)
        run: |
          set -e
          DMG=$(ls dist/*.dmg | head -1)
          echo "Validating staple on: $DMG"
          if ! xcrun stapler validate "$DMG"; then
            echo "::error::DMG is NOT stapled. Refusing to release — users would see 'Aspen is damaged'."
            exit 1
          fi
          echo "✅ DMG staple verified — safe to release."

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml

  build-windows:
    name: Build Windows (EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build renderer
        run: npm run build:renderer

      - name: Build EXE
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            dist/*.exe
            dist/latest.yml

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-published:
    name: Verify LIVE download is stapled
    needs: [release]
    runs-on: macos-latest
    steps:
      - name: Download the actual served DMG and validate its staple
        run: |
          set -e
          echo "Waiting for release asset to be available..."
          sleep 15
          URL="https://github.com/${{ github.repository }}/releases/latest/download/Aspen-mac.dmg"
          echo "Downloading served file: $URL"
          curl -sL -o served.dmg "$URL"
          echo "Validating staple on the LIVE served file..."
          if ! xcrun stapler validate served.dmg; then
            echo "::error::The PUBLISHED DMG is not stapled — users will see 'Aspen is damaged'. The released file is broken even though the build was fine (upload-ordering bug)."
            exit 1
          fi
          echo "✅ LIVE served DMG is stapled — users get a clean download."
