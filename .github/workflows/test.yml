name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (skip Electron binary)
        run: npm install --ignore-scripts

      - name: Run tests
        run: npx vitest run

      - name: Run module tests (src/main)
        run: |
          for f in src/main/*.test.js; do
            echo "▶ $f"
            node "$f" || exit 1
          done

      - name: Verify no TunnelBear branding
        run: |
          if grep -rni "tunnelbear" --include="*.js" --include="*.jsx" --include="*.css" --include="*.html" --include="*.json" . \
            | grep -v node_modules | grep -v ".git/" | grep -v "workspace" | grep -v "test"; then
            echo "ERROR: Found TunnelBear branding references!"
            exit 1
          fi
          echo "✓ No TunnelBear branding found"
