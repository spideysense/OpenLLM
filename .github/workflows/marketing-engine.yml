name: Daily Marketing Engine

on:
  schedule:
    - cron: '0 14 * * *'  # Every day at 7am PT (14:00 UTC)
  workflow_dispatch: {}    # Manual trigger

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate marketing content
        env:
          ASPEN_TUNNEL_URL: ${{ secrets.ASPEN_TUNNEL_URL }}
          ASPEN_API_KEY: ${{ secrets.ASPEN_API_KEY }}
        run: node scripts/marketing-engine.js

      - name: Build blog HTML + SEO
        run: node scripts/build-blog.js

      - name: Auto-distribute to platforms
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: node scripts/auto-distribute.js

      - name: Commit and push new content
        run: |
          git config user.name "Aspen Marketing Bot"
          git config user.email "marketing@runonaspen.com"
          
          # Check if there are changes
          git add marketing/ site/blog/
          git diff --cached --quiet && echo "No new content" && exit 0
          
          DATE=$(date +%Y-%m-%d)
          git commit -m "📝 Daily marketing content — $DATE"
          git push
